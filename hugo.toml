baseURL = "https://ziomsec.com/"
languageCode = "en-us"
title = "ziomsec"
theme = "PaperMod"
enableRobotsTXT = true
canonifyURLs = false

[pagination]
  pagerSize = 15

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[params]
  env = "production"
  defaultTheme = "auto"
  search = true
  disableThemeToggle = false
  ShowBreadCrumbs = true
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowToc = true
  ShowRssButtonInSectionTermList = true
  rssLimit = 30
  comments = false
  hideFooter = true
  assets = {favicon = "/favicon.png"}
  
  description = "Cybersecurity CTF writeups and red team research by Moiz Bootwala. Step-by-step HackTheBox, TryHackMe, VulnHub and Misc ctf walkthroughs with enumeration, exploitation, and privilege escalation guides."
  author = "Moiz Bootwala"
  keywords = ["CTF writeups", "HackTheBox writeups", "TryHackMe writeups", "VulnHub walkthroughs", "cybersecurity blog", "penetration testing", "red team", "purple team", "offensive security", "privilege escalation", "CTF solutions", "infosec", "information security", "security research"]

  [params.cover]
    linkFullImages = true
    relative = true
    hidden = false
    hiddenInList = false
    hiddenInSingle = false
    responsiveImages = true

  [params.schema]
    publisherType = "Person"
    sameAs = [
      "https://github.com/RIZZZIOM",
      "https://www.linkedin.com/in/moiz-bootwala",
      "https://x.com/rizzziom",
      "https://ziomsec.com/index.xml"
    ]

  [params.homeInfoParams]
    Title = "CTF Writeups & Cybersecurity Research"
    Content = "Step-by-step walkthroughs of HackTheBox, TryHackMe, and VulnHub challenges. Offensive security research and tools."

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"
  
  [params.analytics]
    [params.analytics.google]
      SiteVerificationTag = "fLv_TKp4S4b3QNVvFSscyPPJ9Q9JbVWmae-pEa7sPck"
    [params.analytics.bing]
      SiteVerificationTag = "G-XXXXXXXXXX"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20

